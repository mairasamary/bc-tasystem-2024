{% extends "base_v2.html" %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center py-12">
    <div class="w-full max-w-md mx-auto">
        <div class="card-pro rounded-xl overflow-hidden border border-gray-200/80 shadow-sm p-8">
            <div class="text-center mb-8">
                <div class="font-bc-brand mb-2" style="font-family: Lora, Georgia, serif;">
                    <span class="text-xl font-semibold" style="color: #2c353c;">TA Buzz</span>
                </div>
                <p class="text-sm" style="color: #707b8a;">Boston College</p>
            </div>

            <a href="{% url 'django_gauth:login' %}" class="flex items-center justify-center gap-3 w-full px-4 py-3 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-bc-navy-400 focus:ring-offset-2">
                <img src="https://developers.google.com/identity/images/g-logo.png" alt="" class="w-5 h-5" aria-hidden="true">
                Sign in with Google
            </a>

            <div class="relative my-6">
                <span class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-200"></span></span>
                <span class="relative flex justify-center text-xs uppercase tracking-wider"><span class="bg-white px-2 text-gray-500">Or</span></span>
            </div>

            <form method="post" class="form-inputs">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-4">
                    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="w-full inline-flex items-center justify-center px-4 py-2.5 text-sm font-medium text-white bg-bc-navy hover:bg-bc-navy-600 active:bg-bc-navy-700 rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-bc-navy-400 focus:ring-offset-2">
                    Log in
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
